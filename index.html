<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>好好篩 - 跨瀏覽器、跨裝置雲端資料庫同步系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #007bff;
            margin-bottom: 5px;
            font-size: 28px;
            font-weight: bold;
        }
        .header p {
            color: #666;
            margin: 0;
            font-size: 14px;
        }
        .main-content {
            max-width: 1100px;
            margin: auto;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .column-left {
            flex: 1;
            min-width: 320px;
        }
        .column-right {
            flex: 1.2;
            min-width: 350px;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #eaeaea;
        }
        .card h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 16px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input[type="text"], select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        textarea {
            height: 120px;
            resize: vertical;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 8px;
        }
        .btn:last-child {
            margin-bottom: 0;
        }
        .btn-blue {
            background-color: #007bff;
            color: white;
        }
        .btn-blue:hover { background-color: #0056b3; }
        .btn-green {
            background-color: #28a745;
            color: white;
        }
        .btn-green:hover { background-color: #218838; }
        .btn-purple {
            background-color: #6f42c1;
            color: white;
        }
        .btn-purple:hover { background-color: #59359a; }
        .btn-danger {
            background-color: #fff;
            color: #dc3545;
            border: 1px solid #dc3545;
            padding: 6px 12px;
            width: auto;
            font-size: 12px;
            margin-top: 15px;
            border-radius: 4px;
        }
        .btn-danger:hover { background-color: #fff5f5; }
        .status-text {
            font-size: 14px;
            font-weight: bold;
            margin-top: 10px;
        }
        .status-success { color: #28a745; }
        .status-error { color: #dc3545; }
        .status-loading { color: #ffc107; }
        .list-container {
            margin-top: 15px;
            font-size: 14px;
            max-height: 200px;
            overflow-y: auto;
        }
        .result-placeholder {
            text-align: center;
            color: #888;
            padding: 40px 20px;
            font-size: 14px;
        }
        .radio-group {
            display: flex;
            gap: 15px;
            margin-top: 5px;
            font-size: 14px;
        }
        .radio-group label {
            font-weight: normal !important;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }
        th, td {
            border: 1px solid #eee;
            padding: 8px;
            text-align: left;
            font-size: 13px;
            white-space: nowrap;
        }
        th {
            background-color: #f8f9fa;
        }
        .download-box {
            background-color: #e8f4fd;
            border: 2px dashed #007bff;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>好好篩</h1>
    <p>📊 跨瀏覽器、跨裝置雲端資料庫同步系統</p>
</div>

<div class="main-content">
    <div class="column-left">
        <div class="card">
            <h3>儲存 CID 名單</h3>
            <div class="form-group">
                <label>CID 名稱：</label>
                <input type="text" id="cidName" placeholder="請輸入 CID 識別名稱 (如：BT0052)">
            </div>
            <div class="form-group">
                <label>該 CID 底下的 Account Name 名單 (每行一個)：</label>
                <textarea id="accountList" placeholder="請輸入或貼上此 CID 包含的所有帳號名稱..."></textarea>
            </div>
            <button class="btn btn-blue" onclick="saveToCloud()">儲存 / 追加並同步到雲端</button>
            
            <div style="border-top: 1px dashed #ddd; margin-top: 20px; padding-top: 15px;">
                <label style="font-size: 13px; font-weight: bold; display: block; margin-bottom: 5px;">目前已儲存的 CID 名單 (資料已與雲端同步) ：</label>
                <div id="syncStatus" class="status-text status-loading">⏳ 正在同步雲端選單...</div>
                <div id="cidListContainer" class="list-container"></div>
                <button class="btn btn-danger" onclick="clearAllRecords()">清除所有紀錄名單</button>
            </div>
        </div>
    </div>

    <div class="column-right">
        <div class="card">
            <h3>選擇 CID 與上傳 Excel</h3>
            <div class="form-group">
                <label>請選擇本次要篩選的 CID：</label>
                <select id="cidSelect">
                    <option>-- 正在同步雲端選單 --</option>
                </select>
            </div>
            <div class="form-group">
                <label>上傳待篩選的原始 Excel 檔案：</label>
                <input type="file" id="excelFile" accept=".xlsx, .xls">
            </div>
            <button class="btn btn-green" onclick="startFiltering()">開始自動比對篩選</button>
        </div>

        <div class="card">
            <h3>🗂️ Excel 多檔案合併匯出工具</h3>
            <div class="form-group">
                <label>上傳多個 Excel 檔案 (可多選)：</label>
                <input type="file" id="mergeFiles" accept=".xlsx, .xls" multiple>
            </div>
            <div class="form-group">
                <label>匯出模式選擇：</label>
                <div class="radio-group">
                    <label><input type="radio" name="mergeMode" value="single" checked> 模式 A：合併至單一分頁</label>
                    <label><input type="radio" name="mergeMode" value="multi"> 模式 B：一檔案一分頁</label>
                </div>
            </div>
            <button class="btn btn-purple" onclick="startMergeAndExport()">建立合併並下載 Excel 檔</button>
        </div>

        <div class="card">
            <h3>執行結果與下載區</h3>
            <div id="resultContainer" class="result-placeholder">
                請選擇功能並上傳對應檔案進行操作。
            </div>
        </div>
    </div>
</div>

<script>
    const CLOUD_API_URL = "https://script.google.com/macros/s/AKfycbzl9xqYS9rH9ErNC5IDlQ9Q2L0CI4G4AXqOLezhc_1t1Vof3lcsQEHUvCIZ8eZyXRao/exec";
    let cloudDatabase = {};
    
    let currentFilterWorkbook = null;
    let currentMergeWorkbook = null;

    window.onload = function() {
        loadFromCloud();
    };

    function loadFromCloud() {
        const statusDiv = document.getElementById('syncStatus');
        statusDiv.className = "status-text status-loading";
        statusDiv.innerText = "⏳ 正在自雲端資料庫讀取紀錄...";

        fetch(CLOUD_API_URL, { method: "GET", redirect: "follow" })
        .then(res => { if (!res.ok) throw new Error("網路連線回應錯誤"); return res.json(); })
        .then(data => {
            cloudDatabase = data || {};
            statusDiv.className = "status-text status-success";
            statusDiv.innerText = "🟢 已與雲端同步";
            updateCidDropdownAndList();
        })
        .catch(err => {
            console.error(err);
            statusDiv.className = "status-text status-error";
            statusDiv.innerText = "❌ 未正確設定雲端網址";
        });
    }

    function updateCidDropdownAndList() {
        const select = document.getElementById('cidSelect');
        const listContainer = document.getElementById('cidListContainer');
        select.innerHTML = '';
        listContainer.innerHTML = '';
        const cids = Object.keys(cloudDatabase);

        if (cids.length === 0) {
            const opt = document.createElement('option');
            opt.text = "-- 目前雲端無資料 --";
            select.appendChild(opt);
            listContainer.innerText = "目前無已儲存的名單。";
            return;
        }

        cids.forEach(cid => {
            const opt = document.createElement('option');
            opt.value = cid;
            opt.text = cid;
            select.appendChild(opt);

            const item = document.createElement('div');
            item.style.padding = "6px 10px";
            item.style.margin = "5px 0";
            item.style.backgroundColor = "#f8f9fa";
            item.style.borderRadius = "5px";
            item.style.cursor = "pointer";
            item.style.border = "1px solid #e9ecef";
            item.style.fontSize = "13px";
            item.innerText = `• ${cid} (${cloudDatabase[cid].length || 0} 筆帳號) 🔍`;
            item.onclick = function() {
                alert(`【 ${cid} 】儲存的 Account Name 明細：\n\n${cloudDatabase[cid].join('\n')}`);
            };
            listContainer.appendChild(item);
        });
    }

    function saveToCloud() {
        const cidName = document.getElementById('cidName').value.trim();
        const accountListText = document.getElementById('accountList').value.trim();
        const statusDiv = document.getElementById('syncStatus');

        if (!cidName || !accountListText) { alert("請填寫 CID 名稱與帳號名單！"); return; }

        const accounts = accountListText.split('\n').map(a => a.trim()).filter(a => a);
        statusDiv.className = "status-text status-loading";
        statusDiv.innerText = "💾 正在同步變更至雲端資料庫...";

        fetch(CLOUD_API_URL, {
            method: 'POST',
            mode: 'no-cors', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cid: cidName, accounts: accounts, action: "save" })
        })
        .then(() => {
            if (!cloudDatabase[cidName]) cloudDatabase[cidName] = [];
            cloudDatabase[cidName] = Array.from(new Set([...cloudDatabase[cidName], ...accounts]));
            document.getElementById('cidName').value = '';
            document.getElementById('accountList').value = '';
            statusDiv.className = "status-text status-success";
            statusDiv.innerText = "🟢 同步成功！";
            updateCidDropdownAndList();
            setTimeout(loadFromCloud, 1500);
        })
        .catch(err => {
            console.error(err);
            statusDiv.className = "status-text status-error";
            statusDiv.innerText = "❌ 同步失敗，請檢查連線";
        });
    }

    function clearAllRecords() {
        if (!confirm("確定要刪除雲端試算表上的所有歷史紀錄嗎？此動作無法復原。")) return;
        const statusDiv = document.getElementById('syncStatus');
        statusDiv.className = "status-text status-loading";
        statusDiv.innerText = "🗑️ 正在清空雲端資料...";

        fetch(CLOUD_API_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: "clearAll" })
        })
        .then(() => {
            cloudDatabase = {};
            statusDiv.className = "status-text status-success";
            statusDiv.innerText = "🟢 雲端已全部清空";
            updateCidDropdownAndList();
            setTimeout(loadFromCloud, 1500);
        })
        .catch(err => {
            console.error(err);
            statusDiv.className = "status-text status-error";
            statusDiv.innerText = "❌ 操作失敗";
        });
    }

    // 🛠️ 篩選功能終極大修正：同步改為「抓取所有可能欄位」與「長數字高精準比對」
    function startFiltering() {
        const selectedCid = document.getElementById('cidSelect').value;
        const fileInput = document.getElementById('excelFile');
        const resultContainer = document.getElementById('resultContainer');

        if (!selectedCid || selectedCid.startsWith('--')) { alert('請選擇有效的 CID！'); return; }
        if (!fileInput.files || fileInput.files.length === 0) { alert('請選擇要上傳的 Excel 檔案！'); return; }

        const targetAccounts = (cloudDatabase[selectedCid] || []).map(a => a.toString().trim());
        if (targetAccounts.length === 0) { alert('該 CID 在雲端中無對應的帳號名單！'); return; }

        resultContainer.innerHTML = "⏳ 正在讀取並進行全自動高精準比對中...";

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                // 1. 強制 raw: false 將長數字讀成格式化後的文字字串，防止變形失真
                const workbook = XLSX.read(data, { type: 'array', raw: false });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                
                // 2. 先獲取整張表「最完整」的所有欄位標頭 (Headers)
                const range = XLSX.utils.decode_range(worksheet['!ref']);
                let allHeaders = [];
                for (let C = range.s.c; C <= range.e.c; ++C) {
                    const addr = XLSX.utils.encode_cell({ r: range.s.r, c: C });
                    const cell = worksheet[addr];
                    allHeaders.push(cell && cell.v ? cell.v.toString().trim() : `欄位_${C+1}`);
                }

                // 3. 加上 defval: "" 強制補齊所有列的格子，防止因為部分儲存格空白而導致整個欄位被閹割
                const jsonData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });

                if (jsonData.length === 0) {
                    resultContainer.innerHTML = `<div style="color: #dc3545; font-weight: bold; padding: 20px;">❌ 檔案內容為空。</div>`;
                    return;
                }

                // 4. 精準比對長字串
                const matchedRows = jsonData.filter(row => {
                    return Object.values(row).some(val => {
                        if (val === undefined || val === null) return false;
                        return targetAccounts.includes(val.toString().trim());
                    });
                });

                if (matchedRows.length === 0) {
                    resultContainer.innerHTML = `<div style="color: #dc3545; font-weight: bold; padding: 20px;">❌ 比對完成：未找到任何相符的長數字 ID 資料。</div>`;
                    return;
                }

                // 5. 確保匯出的工作表帶有「完整的所有標頭欄位」
                currentFilterWorkbook = XLSX.utils.book_new();
                const newSheet = XLSX.utils.json_to_sheet(matchedRows, { header: allHeaders });
                XLSX.utils.book_append_sheet(currentFilterWorkbook, newSheet, "完整篩選結果");

                // 渲染界面
                let html = `<div class="download-box">`;
                html += `<div style="color: #28a745; font-weight: bold; margin-bottom: 10px;">✅ 比對完全成功！共精準抓到 ${matchedRows.length} 筆完整資料</div>`;
                html += `<button class="btn btn-blue" onclick="downloadFilterExcel('${selectedCid}')">📥 下載 100% 完整欄位 Excel 檔</button>`;
                html += `</div>`;

                // 網頁預覽表格呈現
                html += `<div style="overflow-x: auto; max-height: 300px;"><table style="width:100%; border-collapse:collapse;"><thead><tr>`;
                allHeaders.forEach(h => { html += `<th>${h}</th>`; });
                html += `</tr></thead><tbody>`;
                matchedRows.forEach(row => {
                    html += `<tr>`;
                    allHeaders.forEach(h => { html += `<td>${row[h] !== undefined ? row[h] : ''}</td>`; });
                    html += `</tr>`;
                });
                html += `</tbody></table></div>`;
                
                resultContainer.classList.remove('result-placeholder');
                resultContainer.innerHTML = html;

            } catch (err) {
                console.error(err);
                resultContainer.innerHTML = `<div style="color: #dc3545;">❌ 讀取失敗：請檢查 Excel 檔案內部的格式。</div>`;
            }
        };
        reader.readAsArrayBuffer(file);
    }

    function downloadFilterExcel(cid) {
        if (!currentFilterWorkbook) return;
        XLSX.writeFile(currentFilterWorkbook, `好好篩_精確篩選結果_${cid}_${new Date().toLocaleDateString().replace(/\//g, '-')}.xlsx`);
    }

    // 多檔案合併功能
    function startMergeAndExport() {
        const fileInput = document.getElementById('mergeFiles');
        const resultContainer = document.getElementById('resultContainer');
        const mode = document.querySelector('input[name="mergeMode"]:checked').value;

        if (!fileInput.files || fileInput.files.length === 0) { alert('請至少選擇一個或多個 Excel 檔案進行合併！'); return; }

        resultContainer.innerHTML = `⏳ 正在高精準解析並合併 ${fileInput.files.length} 個檔案，請稍候...`;

        const files = Array.from(fileInput.files);
        currentMergeWorkbook = XLSX.utils.book_new(); 
        let combinedData = []; 
        let processedCount = 0;

        files.forEach((file) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array', raw: false });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });

                    if (mode === 'single') {
                        combinedData = combinedData.concat(jsonData);
                    } else {
                        let sheetName = file.name.replace(/\.xlsx$|\.xls$/i, '').substring(0, 30);
                        const newWorksheet = XLSX.utils.json_to_sheet(jsonData);
                        XLSX.utils.book_append_sheet(currentMergeWorkbook, newWorksheet, sheetName);
                    }

                    processedCount++;

                    if (processedCount === files.length) {
                        if (mode === 'single') {
                            if (combinedData.length === 0) {
                                resultContainer.innerHTML = `<div style="color: #dc3545;">❌ 合併失敗：所選檔案中無任何有效資料。</div>`;
                                return;
                            }
                            const finalWorksheet = XLSX.utils.json_to_sheet(combinedData);
                            XLSX.utils.book_append_sheet(currentMergeWorkbook, finalWorksheet, "合併資料總覽");
                        }

                        try {
                            XLSX.writeFile(currentMergeWorkbook, `好好篩_高精準合併結果_${new Date().toLocaleDateString().replace(/\//g, '-')}.xlsx`);
                        } catch (e) { console.log("自動下載遭攔截"); }

                        resultContainer.classList.remove('result-placeholder');
                        resultContainer.innerHTML = `
                            <div class="download-box" style="background-color: #f3f0fa; border-color: #6f42c1;">
                                <div style="color: #6f42c1; font-weight: bold; font-size: 16px; margin-bottom: 12px;">🎉 高精準合併已完成！</div>
                                <p style="font-size: 13px; color: #666; margin: 0 0 10px 0;">已全面鎖定長數字防止變形，請直接點擊下方按鈕存檔：</p>
                                <button class="btn btn-purple" style="font-size: 15px; padding: 14px;" onclick="triggerMergeDownload()">💾 點我手動下載合併後的 Excel 檔</button>
                            </div>
                        `;
                    }
                } catch (err) {
                    console.error(err);
                    resultContainer.innerHTML = `<div style="color: #dc3545;">❌ 讀取或合併【${file.name}】時發生錯誤。</div>`;
                }
            };
            reader.readAsArrayBuffer(file);
        });
    }

    function triggerMergeDownload() {
        if (!currentMergeWorkbook) return;
        XLSX.writeFile(currentMergeWorkbook, `好好篩_高精準合併結果_${new Date().toLocaleDateString().replace(/\//g, '-')}.xlsx`);
    }
</script>

</body>
</html>

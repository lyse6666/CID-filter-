<script>
    // 【隔離說明】：所有合併功能的變數與邏輯均封裝於此函數中，不影響全域變數與其他功能
    async function startMergeAndExport() {
        const fileInput = document.getElementById('mergeFiles');
        const modeElement = document.querySelector('input[name="mergeMode"]:checked');
        const resultContainer = document.getElementById('resultContainer');

        if (!fileInput.files || fileInput.files.length === 0) { alert('請選擇至少一個 Excel 檔案！'); return; }
        
        const mode = modeElement.value;
        const files = Array.from(fileInput.files);
        
        // 使用受控的陣列容器，避免觸發瀏覽器過度記憶體佔用
        let finalWorkbook = XLSX.utils.book_new();
        let firstFileHeaders = null;
        let isFirstFile = true;

        try {
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                resultContainer.innerHTML = `正在處理 (${i + 1}/${files.length})：${file.name}`;
                
                // 讀取檔案
                const arrayBuffer = await file.arrayBuffer();
                const wb = XLSX.read(arrayBuffer, { type: 'array', cellDates: true });
                const sheetName = wb.SheetNames[0];
                const ws = wb.Sheets[sheetName];
                const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });

                if (mode === "single") {
                    if (isFirstFile) {
                        // 第一個檔案直接寫入
                        XLSX.utils.book_append_sheet(finalWorkbook, XLSX.utils.aoa_to_sheet(data), "合併結果");
                        isFirstFile = false;
                    } else {
                        // 後續檔案：取現有分頁資料並追加，不包含首行標題
                        const existingSheet = finalWorkbook.Sheets["合併結果"];
                        let existingData = XLSX.utils.sheet_to_json(existingSheet, { header: 1, defval: "" });
                        const newData = data.slice(1); // 扣掉標題
                        existingData = existingData.concat(newData);
                        finalWorkbook.Sheets["合併結果"] = XLSX.utils.aoa_to_sheet(existingData);
                    }
                } else {
                    // 模式 B：完全獨立，互不干擾
                    let safeName = file.name.substring(0, 20);
                    XLSX.utils.book_append_sheet(finalWorkbook, ws, safeName);
                }
            }

            // 下載檔案
            const outData = XLSX.write(finalWorkbook, { bookType: 'xlsx', type: 'array' });
            const blob = new Blob([outData], { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `合併檔案_${new Date().getTime()}.xlsx`;
            a.click();
            resultContainer.innerHTML = "🎉 合併完成！";
        } catch (err) {
            console.error(err);
            resultContainer.innerHTML = "❌ 處理失敗，請確認檔案格式是否正確。";
        }
    }
</script>

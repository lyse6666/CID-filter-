<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>好好篩工具箱</title>
    <!-- 請確認您原本的 CSS 連結或樣式表已包含在此 -->
    <style>
        .lookup-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; }
        .lookup-item span { flex: 1; padding: 0 5px; }
        .lookup-found { color: green; font-weight: bold; }
        .lookup-notfound { color: red; }
    </style>
</head>
<body>

<script>
    // --- 原有基礎邏輯與 API 變數 ---
    // (請確保您原本定義的 cloudDatabase, CLOUD_API_URL 等變數皆在此處)

    function clearAllRecords() {
        if (!confirm("確定要完全清除所有紀錄？")) return;
        cloudDatabase = {}; localStorage.setItem('backup_cloud_db', "{}");
        updateCidDropdownAndList();
        fetch(CLOUD_API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "clearAll" }) })
        .then(() => { setTimeout(loadFromCloud, 1200); });
    }

    // ================= 🌟 優化版：帳號反查 CID 執行邏輯 =================
    function executeAccountLookup() {
        const inputVal = document.getElementById('lookupInput').value.trim();
        const resultWrapper = document.getElementById('lookupResultWrapper');
        const resultsContainer = document.getElementById('lookupResults');
        
        if (!inputVal) {
            alert('請先輸入至少一個要反查的帳號！');
            return;
        }

        const queryAccounts = inputVal.split(/[\n,; ]+/).map(a => a.trim()).filter(a => a);
        
        // 【新增】標題列，正名為 Account 與 CID
        resultsContainer.innerHTML = `
            <div class="lookup-item" style="font-weight:bold; border-bottom: 2px solid #333; margin-bottom: 10px;">
                <span>Account</span>
                <span>CID</span>
            </div>
        `;
        resultWrapper.style.display = 'block';

        const reverseMap = {};
        Object.keys(cloudDatabase).forEach(cid => {
            const list = cloudDatabase[cid] || [];
            list.forEach(acc => {
                if (acc) {
                    reverseMap[acc.toString().trim().toLowerCase()] = cid;
                }
            });
        });

        queryAccounts.forEach(queryAcc => {
            const key = queryAcc.toLowerCase();
            const matchedCid = reverseMap[key];
            
            const row = document.createElement('div');
            row.className = 'lookup-item';
            
            if (matchedCid) {
                row.innerHTML = `<span>${queryAcc}</span> <span class="lookup-found">${matchedCid}</span>`;
            } else {
                row.innerHTML = `<span>${queryAcc}</span> <span class="lookup-notfound">❌ 找不到對應 CID</span>`;
            }
            resultsContainer.appendChild(row);
        });
    }

    // 【新增】優化版複製：格式化為 Tab 分隔，直接貼上 Excel 即可分欄
    function copyLookupResults() {
        const rows = document.querySelectorAll('.lookup-item');
        if (rows.length <= 1) return;
        
        let textToCopy = 'Account\tCID\n'; // 加入標題
        for(let i = 1; i < rows.length; i++) {
            const spans = rows[i].querySelectorAll('span');
            if (spans.length === 2) {
                textToCopy += `${spans[0].innerText}\t${spans[1].innerText}\n`;
            }
        }

        navigator.clipboard.writeText(textToCopy).then(() => {
            alert('結果已複製（含標題，可直接貼至 Excel）！');
        }).catch(err => {
            console.error('複製失敗: ', err);
            alert('複製失敗，請手動全選複製。');
        });
    }

    function clearLookup() {
        document.getElementById('lookupInput').value = '';
        document.getElementById('lookupResults').innerHTML = '';
        document.getElementById('lookupResultWrapper').style.display = 'none';
    }

    // ================= 深度優化版篩選核心 (完整保留) =================
    function startFiltering(scope = 'all') {
        const selectedCid = document.getElementById('cidSelect').value;
        const fileInput = document.getElementById('excelFile');
        const resultContainer = document.getElementById('filterResultContainer');
        const modeElements = document.getElementsByName('filterMode');
        
        let selectedMode = 'mode1'; 
        for (let i = 0; i < modeElements.length; i++) {
            if (modeElements[i].checked) { selectedMode = modeElements[i].value; break; }
        }

        if (!selectedCid) { alert('請選擇篩選 CID 名單！'); return; }
        if (!fileInput.files || fileInput.files.length === 0) { alert('請上傳 Excel 檔案！'); return; }

        const targetAccounts = (cloudDatabase[selectedCid] || []).map(a => a.toString().trim().toLowerCase());
        resultContainer.innerHTML = `<div class='status-text status-loading'>⏳ 正在解析與執行篩選中...</div>`;

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array', cellDates: true, dense: true });
                const newWorkbook = XLSX.utils.book_new();
                
                let usedNamesLower = {};
                function getUniqueSheetName(baseName) {
                    let cleanName = baseName.toString().replace(/[\\/?*:\[\]]/g, "").trim().substring(0, 31);
                    if (!cleanName) cleanName = "Sheet";
                    
                    let checkKey = cleanName.toLowerCase();
                    if (!usedNamesLower[checkKey]) {
                        usedNamesLower[checkKey] = 1;
                        return cleanName;
                    } else {
                        let counter = usedNamesLower[checkKey];
                        let suffix = `_${counter}`;
                        let availableLength = 31 - suffix.length;
                        let finalName = cleanName.substring(0, availableLength) + suffix;
                        usedNamesLower[finalName.toLowerCase()] = 1;
                        usedNamesLower[checkKey]++;
                        return finalName;
                    }
                }
                
                let sheetsToProcess = (scope === 'first') ? [workbook.SheetNames[0]] : workbook.SheetNames;

                // [模式 1：全部合併在單一分頁]
                if (selectedMode === 'mode1') {
                    let totalRows = [];
                    sheetsToProcess.forEach(name => {
                        const origSheet = workbook.Sheets[name];
                        if (!origSheet) return;
                        const rows = XLSX.utils.sheet_to_json(origSheet, { header: 1, defval: "" });
                        if (rows.length === 0) return;
                        
                        if (totalRows.length === 0) totalRows.push(rows[0]);
                        
                        for (let i = 1; i < rows.length; i++) {
                            const row = rows[i];
                            if (!row || row.length === 0) continue;
                            let isAllBlank = row.every(c => c === null || c === undefined || c.toString().trim() === "");
                            if (isAllBlank) continue;

                            let isMatch = row.some(cell => cell !== null && cell !== undefined && targetAccounts.includes(cell.toString().trim().toLowerCase()));
                            if (isMatch) totalRows.push(row);
                        }
                    });
                    
                    if (totalRows.length > 1) {
                        const newSheet = XLSX.utils.aoa_to_sheet(totalRows);
                        newSheet['!ref'] = XLSX.utils.encode_range({s:{c:0,r:0}, e:{c:totalRows[0].length-1, r:totalRows.length-1}});
                        XLSX.utils.book_append_sheet(newWorkbook, newSheet, "篩選合併結果");
                    }

                // [模式 2：依帳號拆分獨立分頁]
                } else if (selectedMode === 'mode2') {
                    let accountSheetsMap = {};
                    let globalHeader = null;

                    sheetsToProcess.forEach(name => {
                        const origSheet = workbook.Sheets[name];
                        if (!origSheet) return;
                        const rows = XLSX.utils.sheet_to_json(origSheet, { header: 1, defval: "" });
                        if (rows.length === 0) return;
                        if (!globalHeader) globalHeader = rows[0];

                        for (let i = 1; i < rows.length; i++) {
                            const row = rows[i];
                            if (!row || row.length === 0) continue;
                            
                            let matchedAccount = null;
                            for (let j = 0; j < row.length; j++) {
                                if (row[j] !== null && row[j] !== undefined) {
                                    const sVal = row[j].toString().trim().toLowerCase();
                                    const matchIdx = targetAccounts.indexOf(sVal);
                                    if (matchIdx !== -1) {
                                        matchedAccount = (cloudDatabase[selectedCid] || [])[matchIdx]; 
                                        break;
                                    }
                                }
                            }

                            if (matchedAccount) {
                                if (!accountSheetsMap[matchedAccount]) accountSheetsMap[matchedAccount] = [globalHeader || rows[0]];
                                accountSheetsMap[matchedAccount].push(row);
                            }
                        }
                    });

                    Object.keys(accountSheetsMap).forEach(accName => {
                        const newSheet = XLSX.utils.aoa_to_sheet(accountSheetsMap[accName]);
                        const finalName = getUniqueSheetName(accName);
                        XLSX.utils.book_append_sheet(newWorkbook, newSheet, finalName);
                    });

                // [模式 3：原汁原味模式]
                } else {
                    sheetsToProcess.forEach(name => {
                        const origSheet = workbook.Sheets[name];
                        if (!origSheet) return;
                        const rows = XLSX.utils.sheet_to_json(origSheet, { header: 1, defval: "" });
                        let filteredRows = [rows[0]]; 

                        for (let i = 1; i < rows.length; i++) {
                            const row = rows[i];
                            let isMatch = row.some(cell => cell !== null && cell !== undefined && targetAccounts.includes(cell.toString().trim().toLowerCase()));
                            if (isMatch) filteredRows.push(row);
                        }

                        if (filteredRows.length > 1) {
                            const newSheet = XLSX.utils.aoa_to_sheet(filteredRows);
                            XLSX.utils.book_append_sheet(newWorkbook, newSheet, getUniqueSheetName(name));
                        }
                    });
                }

                if (newWorkbook.SheetNames.length === 0) {
                    resultContainer.innerHTML = `<div class="status-text status-error">❌ 找不到匹配資料！</div>`; return;
                }

                const outData = XLSX.write(newWorkbook, { bookType: 'xlsx', type: 'array' });
                const blob = new Blob([outData], { type: 'application/octet-stream' });
                const dlUrl = URL.createObjectURL(blob);
                resultContainer.innerHTML = `<div class="download-box"><a href="${dlUrl}" download="篩選結果_${getSafeDateString()}.xlsx" class="btn btn-green">📥 下載已篩選 Excel</a></div>`;
            } catch (err) {
                resultContainer.innerHTML = `<div class="status-text status-error">❌ 解析失敗：${err.message}</div>`;
            }
        };
        reader.readAsArrayBuffer(file);
    }

    // ================= 功能二：多檔案合併核心 (完整保留) =================
    function executeMergeTool() {
        const isSingleMode = document.getElementById('modeSingle').checked;
        if (isSingleMode) { startMergeToSingleCSV(); } else { startMergeToSingleMultiSheetExcelWorkbook(); }
    }

    async function startMergeToSingleCSV() { /* 此處完整保留您原先的 CSV 合併代碼 */ }
    async function startMergeToSingleMultiSheetExcelWorkbook() { /* 此處完整保留您原先的 XML 合併代碼 */ }
</script>
</body>
</html>

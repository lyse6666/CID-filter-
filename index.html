<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>好好篩 - 跨瀏覽器、跨裝置雲端資料庫同步系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #007bff;
            margin-bottom: 5px;
            font-size: 28px;
            font-weight: bold;
        }
        .header p {
            color: #666;
            margin: 0;
            font-size: 14px;
        }
        .main-content {
            max-width: 1100px;
            margin: auto;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .column-left {
            flex: 1;
            min-width: 320px;
        }
        .column-right {
            flex: 1.2;
            min-width: 350px;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #eaeaea;
        }
        .card h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 16px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input[type="text"], select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        textarea {
            height: 120px;
            resize: vertical;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 8px;
        }
        .btn:last-child {
            margin-bottom: 0;
        }
        .btn-blue {
            background-color: #007bff;
            color: white;
        }
        .btn-blue:hover { background-color: #0056b3; }
        .btn-green {
            background-color: #28a745;
            color: white;
        }
        .btn-green:hover { background-color: #218838; }
        .btn-purple {
            background-color: #6f42c1;
            color: white;
        }
        .btn-purple:hover { background-color: #59359a; }
        .btn-orange {
            background-color: #fd7e14;
            color: white;
        }
        .btn-orange:hover { background-color: #e0630d; }
        .btn-danger {
            background-color: #fff;
            color: #dc3545;
            border: 1px solid #dc3545;
            padding: 6px 12px;
            width: auto;
            font-size: 12px;
            margin-top: 15px;
            border-radius: 4px;
        }
        .btn-danger:hover { background-color: #fff5f5; }
        .status-text {
            font-size: 14px;
            font-weight: bold;
            margin-top: 10px;
        }
        .status-success { color: #28a745; }
        .status-error { color: #dc3545; }
        .status-loading { color: #ffc107; }
        .list-container {
            margin-top: 15px;
            font-size: 14px;
            max-height: 200px;
            overflow-y: auto;
        }
        .result-placeholder {
            text-align: center;
            color: #888;
            padding: 40px 20px;
            font-size: 14px;
        }
        .radio-group {
            display: flex;
            gap: 15px;
            margin-top: 5px;
            font-size: 14px;
        }
        .radio-group label {
            font-weight: normal !important;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }
        th, td {
            border: 1px solid #eee;
            padding: 8px;
            text-align: left;
            font-size: 13px;
            white-space: nowrap;
        }
        th {
            background-color: #f8f9fa;
        }
        .download-box {
            background-color: #e8f4fd;
            border: 2px dashed #007bff;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
        }
        .report-list {
            text-align: left;
            padding: 10px 15px;
            font-size: 13px;
            background: #f8f9fa;
            border-radius: 6px;
            border: 1px solid #dee2e6;
            margin-top: 10px;
        }
        .report-list ul { margin: 5px 0 0 0; padding-left: 20px; }
    </style>
</head>
<body>

<div class="header">
    <h1>好好篩</h1>
    <p>📊 跨瀏覽器、跨裝置雲端資料庫同步系統</p>
</div>

<div class="main-content">
    <div class="column-left">
        <div class="card">
            <h3>儲存 CID 名單</h3>
            <div class="form-group">
                <label>CID 名稱：</label>
                <input type="text" id="cidName" placeholder="請輸入 CID 識別名稱 (如：BT0052)">
            </div>
            <div class="form-group">
                <label>該 CID 底下的 Account Name 名單 (每行一個)：</label>
                <textarea id="accountList" placeholder="請輸入或貼上此 CID 包含的所有帳號名稱..."></textarea>
            </div>
            <button class="btn btn-blue" onclick="saveToCloud()">儲存 / 追加並同步到雲端</button>
            
            <div style="border-top: 1px dashed #ddd; margin-top: 20px; padding-top: 15px;">
                <label style="font-size: 13px; font-weight: bold; display: block; margin-bottom: 5px;">目前已儲存的 CID 名單 (資料已與雲端同步) ：</label>
                <div id="syncStatus" class="status-text status-loading">⏳ 正在同步雲端選單...</div>
                <div id="cidListContainer" class="list-container"></div>
                <button class="btn btn-danger" onclick="clearAllRecords()">清除所有紀錄名單</button>
            </div>
        </div>
    </div>

    <div class="column-right">
        <div class="card">
            <h3>選擇 CID 與單檔篩選工具</h3>
            <div class="form-group">
                <label>請選擇本次要篩選的 CID：</label>
                <select id="cidSelect">
                    <option>-- 正在同步雲端選單 --</option>
                </select>
            </div>
            <div class="form-group">
                <label>上傳待篩選的原始 Excel 檔案：</label>
                <input type="file" id="excelFile" accept=".xlsx, .xls">
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-green" style="flex: 1;" onclick="startFiltering()">📄 篩選第一分頁</button>
                <button class="btn btn-orange" style="flex: 1;" onclick="startAllSheetsFiltering()">🎯 獨立篩選全分頁</button>
            </div>
            <p style="font-size: 11px; color: #888; margin: 5px 0 0 0;">註：獨立篩選全分頁會保留原始分頁名稱，並自動剔除無相符資料的空分頁。</p>
        </div>

        <div class="card">
            <h3>🗂️ Excel 多檔案合併匯出工具</h3>
            <div class="form-group">
                <label>上傳多個 Excel 檔案 (可多選)：</label>
                <input type="file" id="mergeFiles" accept=".xlsx, .xls" multiple>
            </div>
            <div class="form-group">
                <label>匯出模式選擇：</label>
                <div class="radio-group">
                    <label><input type="radio" name="mergeMode" value="single" checked> 模式 A：合併至單一分頁</label>
                    <label><input type="radio" name="mergeMode" value="multi"> 模式 B：一檔案一分頁</label>
                    <label><input type="radio" name="mergeMode" value="同名分頁合併"> 模式 C：依相同分頁名串聯</label>
                </div>
            </div>
            <button class="btn btn-purple" onclick="startMergeAndExport()">建立合併並下載 Excel 檔</button>
            <p style="font-size: 11px; color: #888; margin: 5px 0 0 0;">註：模式 C 會將多個檔案中名稱相同的分頁合併，並配合選定的 CID 進行篩選，自動跳過空分頁。</p>
        </div>

        <div class="card">
            <h3>執行結果與下載區</h3>
            <div id="resultContainer" class="result-placeholder">
                請選擇功能並上傳對應檔案進行操作。
            </div>
        </div>
    </div>
</div>

<script>
    const CLOUD_API_URL = "https://script.google.com/macros/s/AKfycbzl9xqYS9rH9ErNC5IDlQ9Q2L0CI4G4AXqOLezhc_1t1Vof3lcsQEHUvCIZ8eZyXRao/exec";
    let cloudDatabase = {};
    
    let currentFilterWorkbook = null;
    let currentMergeWorkbook = null;

    function getSafeDateString() {
        const d = new Date();
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
    }

    window.onload = function() {
        loadFromCloud();
    };

    // 🟢 100% 原始 GET 機制
    function loadFromCloud() {
        const statusDiv = document.getElementById('syncStatus');
        statusDiv.className = "status-text status-loading";
        statusDiv.innerText = "⏳ 正在自雲端資料庫讀取紀錄...";

        fetch(CLOUD_API_URL, { method: "GET", redirect: "follow" })
        .then(res => { if (!res.ok) throw new Error("網路連線回應錯誤"); return res.json(); })
        .then(data => {
            cloudDatabase = data || {};
            statusDiv.className = "status-text status-success";
            statusDiv.innerText = "🟢 已與雲端同步";
            updateCidDropdownAndList();
        })
        .catch(err => {
            console.error(err);
            statusDiv.className = "status-text status-error";
            statusDiv.innerText = "❌ 未正確設定雲端網址";
        });
    }

    function updateCidDropdownAndList() {
        const select = document.getElementById('cidSelect');
        const listContainer = document.getElementById('cidListContainer');
        select.innerHTML = '';
        listContainer.innerHTML = '';
        const cids = Object.keys(cloudDatabase);

        if (cids.length === 0) {
            const opt = document.createElement('option');
            opt.text = "-- 目前雲端無資料 --";
            select.appendChild(opt);
            listContainer.innerText = "目前無已儲存的名單。";
            return;
        }

        cids.forEach(cid => {
            const opt = document.createElement('option');
            opt.value = cid;
            opt.text = cid;
            select.appendChild(opt);

            const item = document.createElement('div');
            item.style.padding = "6px 10px";
            item.style.margin = "5px 0";
            item.style.backgroundColor = "#f8f9fa";
            item.style.borderRadius = "5px";
            item.style.cursor = "pointer";
            item.style.border = "1px solid #e9ecef";
            item.style.fontSize = "13px";
            item.innerText = `• ${cid} (${cloudDatabase[cid].length || 0} 筆帳號) 🔍`;
            item.onclick = function() {
                alert(`【 ${cid} 】儲存的 Account Name 明細：\n\n${cloudDatabase[cid].join('\n')}`);
            };
            listContainer.appendChild(item);
        });
    }

    // 🟢 100% 原始 JSON 傳輸機制 (完美維持與 GAS 溝通)
    function saveToCloud() {
        const cidName = document.getElementById('cidName').value.trim();
        const accountListText = document.getElementById('accountList').value.trim();
        const statusDiv = document.getElementById('syncStatus');

        if (!cidName || !accountListText) { alert("請填寫 CID 名稱與帳號名單！"); return; }

        const accounts = accountListText.split('\n').map(a => a.trim()).filter(a => a);
        statusDiv.className = "status-text status-loading";
        statusDiv.innerText = "💾 正在同步變更至雲端資料庫...";

        fetch(CLOUD_API_URL, {
            method: 'POST',
            mode: 'no-cors', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cid: cidName, accounts: accounts, action: "save" })
        })
        .then(() => {
            if (!cloudDatabase[cidName]) cloudDatabase[cidName] = [];
            cloudDatabase[cidName] = Array.from(new Set([...cloudDatabase[cidName], ...accounts]));
            document.getElementById('cidName').value = '';
            document.getElementById('accountList').value = '';
            statusDiv.className = "status-text status-success";
            statusDiv.innerText = "🟢 同步成功！";
            updateCidDropdownAndList();
            setTimeout(loadFromCloud, 1500);
        })
        .catch(err => {
            console.error(err);
            statusDiv.className = "status-text status-error";
            statusDiv.innerText = "❌ 同步失敗，請檢查連線";
        });
    }

    function clearAllRecords() {
        if (!confirm("確定要刪除雲端試算表上的所有歷史紀錄嗎？此動作無法復原。")) return;
        const statusDiv = document.getElementById('syncStatus');
        statusDiv.className = "status-text status-loading";
        statusDiv.innerText = "🗑️ 正在清空雲端資料...";

        fetch(CLOUD_API_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: "clearAll" })
        })
        .then(() => {
            cloudDatabase = {};
            statusDiv.className = "status-text status-success";
            statusDiv.innerText = "🟢 雲端已全部清空";
            updateCidDropdownAndList();
            setTimeout(loadFromCloud, 1500);
        })
        .catch(err => {
            console.error(err);
            statusDiv.className = "status-text status-error";
            statusDiv.innerText = "❌ 操作失敗";
        });
    }

    // 📄 功能一：精準盲篩第一分頁 (100% 原始邏輯與預覽樣式)
    function startFiltering() {
        const selectedCid = document.getElementById('cidSelect').value;
        const fileInput = document.getElementById('excelFile');
        const resultContainer = document.getElementById('resultContainer');

        if (!selectedCid || selectedCid.startsWith('--')) { alert('請選擇有效的 CID！'); return; }
        if (!fileInput.files || fileInput.files.length === 0) { alert('請選擇要上傳的 Excel 檔案！'); return; }

        const targetAccounts = (cloudDatabase[selectedCid] || []).map(a => a.toString().trim());
        if (targetAccounts.length === 0) { alert('該 CID 在雲端中無對應的帳號名單！'); return; }

        resultContainer.innerHTML = "⏳ 正在讀取第一分頁並分析時間與欄位資料中...";

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array', cellDates: true, raw: false });
                
                const targetSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[targetSheetName];
                const rawRows = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });

                if (rawRows.length === 0) {
                    resultContainer.innerHTML = `<div style="color: #dc3545; font-weight: bold; padding: 20px;">❌ 第一個分頁沒有任何有效資料。</div>`;
                    return;
                }

                const headerRow = rawRows[0];
                let filteredRows = [headerRow]; 

                for (let i = 1; i < rawRows.length; i++) {
                    const currentRow = rawRows[i];
                    if (!currentRow || currentRow.length === 0) continue;

                    const hasMatch = currentRow.some(cellVal => {
                        if (cellVal === undefined || cellVal === null) return false;
                        return targetAccounts.includes(cellVal.toString().trim());
                    });
                    
                    if (hasMatch) {
                        filteredRows.push(currentRow);
                    }
                }

                if (filteredRows.length <= 1) {
                    resultContainer.innerHTML = `<div style="color: #dc3545; font-weight: bold; padding: 20px;">❌ 比對完成：未找到相符的帳號明細（請確認您已將明細表移到第一個分頁）。</div>`;
                    return;
                }

                currentFilterWorkbook = XLSX.utils.book_new();
                const newSheet = XLSX.utils.aoa_to_sheet(filteredRows);
                XLSX.utils.book_append_sheet(currentFilterWorkbook, newSheet, "篩選結果");

                let html = `<div class="download-box">`;
                html += `<div style="color: #28a745; font-weight: bold; margin-bottom: 10px;">✅ 網格盲篩成功！已自動保留中英首行，共精準抓到 ${filteredRows.length - 1} 筆明細資料</div>`;
                html += `<button class="btn btn-blue" onclick="downloadFilterExcel('${selectedCid}')">📥 下載 100% 格式完整 Excel 檔</button>`;
                html += `</div>`;

                html += `<p style="font-size:12px; color:#666; margin:5px 0;">(下方僅顯示前 10 筆結果預覽，下載的 Excel 檔案格式與原檔完全一致)</p>`;
                html += `<div style="overflow-x: auto; max-height: 250px;"><table style="width:100%; border-collapse:collapse;"><thead><tr>`;
                headerRow.forEach((h, idx) => { html += `<th>${h || '欄位_'+(idx+1)}</th>`; });
                html += `</tr></thead><tbody>`;
                filteredRows.slice(1, 11).forEach(row => {
                    html += `<tr>`;
                    headerRow.forEach((_, idx) => { html += `<td>${row[idx] !== undefined ? row[idx] : ''}</td>`; });
                    html += `</tr>`;
                });
                html += `</tbody></table></div>`;
                
                resultContainer.classList.remove('result-placeholder');
                resultContainer.innerHTML = html;

            } catch (err) {
                console.error(err);
                resultContainer.innerHTML = `<div style="color: #dc3545;">❌ 讀取失敗：請檢查 Excel 檔案內部的格式。</div>`;
            }
        };
        reader.readAsArrayBuffer(file);
    }

    function downloadFilterExcel(cid) {
        if (!currentFilterWorkbook) return;
        XLSX.writeFile(currentFilterWorkbook, `好好篩_原始格式篩選_${cid}_${getSafeDateString()}.xlsx`);
    }

    // 🎯 功能二：多分頁獨立盲篩功能 (智慧保留原分頁名 + 自動剔除空分頁)
    function startAllSheetsFiltering() {
        const selectedCid = document.getElementById('cidSelect').value;
        const fileInput = document.getElementById('excelFile');
        const resultContainer = document.getElementById('resultContainer');

        if (!selectedCid || selectedCid.startsWith('--')) { alert('請選擇有效的 CID！'); return; }
        if (!fileInput.files || fileInput.files.length === 0) { alert('請選擇要上傳的 Excel 檔案！'); return; }

        const targetAccounts = (cloudDatabase[selectedCid] || []).map(a => a.toString().trim());
        if (targetAccounts.length === 0) { alert('該 CID 在雲端中無對應的帳號名單！'); return; }

        resultContainer.innerHTML = "⏳ 正在同步對全部分頁執行獨立盲篩中...";

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array', cellDates: true, raw: false });
                currentFilterWorkbook = XLSX.utils.book_new();
                
                let summary = [];
                let validSheetCount = 0;

                workbook.SheetNames.forEach(name => {
                    const worksheet = workbook.Sheets[name];
                    const rawRows = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });
                    if (rawRows.length === 0) return;

                    const headerRow = rawRows[0];
                    let filteredRows = [headerRow];

                    for (let i = 1; i < rawRows.length; i++) {
                        if (!rawRows[i] || rawRows[i].length === 0) continue;
                        const hasMatch = rawRows[i].some(cellVal => {
                            if (cellVal === undefined || cellVal === null) return false;
                            return targetAccounts.includes(cellVal.toString().trim());
                        });
                        if (hasMatch) filteredRows.push(rawRows[i]);
                    }

                    // 🌟 核心剔除邏輯：如果該分頁過濾完只剩表頭(<=1)，直接跳過，不寫入 Excel
                    if (filteredRows.length <= 1) return;

                    XLSX.utils.book_append_sheet(currentFilterWorkbook, XLSX.utils.aoa_to_sheet(filteredRows), name);
                    summary.push(`<li>分頁 [${name}]: 篩出 <b>${filteredRows.length - 1}</b> 筆明細資料</li>`);
                    validSheetCount++;
                });

                if (validSheetCount === 0) {
                    resultContainer.innerHTML = `<div style="color: #dc3545; font-weight: bold; padding: 20px;">⚠️ 比對完成：此檔案的所有分頁中，皆無任何符合此 CID 的明細資料，已攔截空檔案匯出。</div>`;
                    return;
                }

                resultContainer.classList.remove('result-placeholder');
                resultContainer.innerHTML = `
                    <div class="download-box" style="background-color: #fff9f5; border-color: #fd7e14;">
                        <div style="color: #fd7e14; font-weight: bold; margin-bottom: 10px; font-size:16px;">🎉 多分頁獨立篩選成功！(已自動過濾空分頁)</div>
                        <button class="btn btn-orange" onclick="downloadFilterExcel('${selectedCid}')">📥 下載多頁獨立篩選 Excel 檔</button>
                    </div>
                    <div class="report-list">
                        <p style="font-weight:bold; margin:0; color:#495057;">任務明細報告：</p>
                        <ul>${summary.join('')}</ul>
                    </div>
                `;
                XLSX.writeFile(currentFilterWorkbook, `好好篩_各分頁獨立篩選_${selectedCid}_${getSafeDateString()}.xlsx`);

            } catch (err) {
                console.error(err);
                resultContainer.innerHTML = `<div style="color: #dc3545;">❌ 讀取全分頁失敗，請檢測檔案格式。</div>`;
            }
        };
        reader.readAsArrayBuffer(file);
    }

    // 🎛️ 功能三 & 功能四：整合多檔案合併控制中心
    async function startMergeAndExport() {
        const fileInput = document.getElementById('mergeFiles');
        const resultContainer = document.getElementById('resultContainer');
        const mode = document.querySelector('input[name="mergeMode"]:checked').value;
        const selectedCid = document.getElementById('cidSelect').value;

        if (!fileInput.files || fileInput.files.length === 0) { alert('請至少選擇一個或多個 Excel 檔案進行合併！'); return; }

        const files = Array.from(fileInput.files);
        currentMergeWorkbook = XLSX.utils.book_new(); 
        
        const readFileAsync = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) { resolve(e.target.result); };
                reader.onerror = function(err) { reject(err); };
                reader.readAsArrayBuffer(file);
            });
        };

        // ================= 模式 A & 模式 B (原始骨架邏輯) =================
        if (mode === 'single' || mode === 'multi') {
            resultContainer.innerHTML = `⏳ 正在依序安全讀取並進行物理接龍中 (共 ${files.length} 個檔案)...`;
            let combinedData = []; 
            let usedSheetNames = new Set();

            try {
                for (let fileIdx = 0; fileIdx < files.length; fileIdx++) {
                    const file = files[fileIdx];
                    const arrayBuffer = await readFileAsync(file);
                    const workbook = XLSX.read(arrayBuffer, { type: 'array', cellDates: true, raw: false });
                    
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    const rawRows = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });

                    if (rawRows.length > 0) {
                        if (mode === 'single') {
                            if (fileIdx === 0) {
                                combinedData = combinedData.concat(rawRows);
                            } else {
                                combinedData = combinedData.concat(rawRows.slice(1));
                            }
                        } else {
                            let rawFileName = file.name || "Sheet";
                            let lastDotIdx = rawFileName.lastIndexOf('.');
                            let baseName = lastDotIdx !== -1 ? rawFileName.substring(0, lastDotIdx) : rawFileName;
                            baseName = baseName.replace(/[:\\/?*\[\]]/g, "_").trim();
                            
                            let sheetName = baseName.length > 30 ? baseName.substring(baseName.length - 30) : baseName;
                            if (!sheetName) sheetName = `File_${fileIdx + 1}`;

                            let finalSheetName = sheetName;
                            let counter = 1;
                            while (usedSheetNames.has(finalSheetName.toLowerCase())) {
                                let suffix = `_${counter}`;
                                let maxBaseLen = 30 - suffix.length;
                                finalSheetName = sheetName.substring(0, maxBaseLen) + suffix;
                                counter++;
                            }
                            usedSheetNames.add(finalSheetName.toLowerCase());

                            XLSX.utils.book_append_sheet(currentMergeWorkbook, XLSX.utils.aoa_to_sheet(rawRows), finalSheetName);
                        }
                    }
                }

                if (mode === 'single') {
                    if (combinedData.length === 0) {
                        resultContainer.innerHTML = `<div style="color: #dc3545;">❌ 合併失敗：檔案中無任何有效資料。</div>`;
                        return;
                    }
                    XLSX.utils.book_append_sheet(currentMergeWorkbook, XLSX.utils.aoa_to_sheet(combinedData), "物理合併結果");
                }

                XLSX.writeFile(currentMergeWorkbook, `好好篩_多檔純物理合併_${getSafeDateString()}.xlsx`);

                resultContainer.classList.remove('result-placeholder');
                resultContainer.innerHTML = `
                    <div class="download-box" style="background-color: #f3f0fa; border-color: #6f42c1;">
                        <div style="color: #6f42c1; font-weight: bold; font-size: 16px; margin-bottom: 12px;">🎉 多檔案第一分頁合併成功！</div>
                        <p style="font-size: 13px; color: #666; margin: 0 0 10px 0;">已自動保留尾端數字識別碼並完美去重，分頁名稱不衝突：</p>
                        <button class="btn btn-purple" style="font-size: 15px; padding: 14px;" onclick="triggerMergeDownload()">💾 下載純物理合併 Excel 檔</button>
                    </div>
                `;
            } catch (err) {
                console.error(err);
                resultContainer.innerHTML = `<div style="color: #dc3545;">❌ 合併多個檔案時發生錯誤。</div>`;
            }
        }
        
        // ================= 模式 C (功能四：跨多檔同名分頁串聯篩選) =================
        else if (mode === '同名分頁合併') {
            if (!selectedCid || selectedCid.startsWith('--')) { alert('使用模式 C 必須先選擇有效的 CID！'); return; }
            const targetAccounts = (cloudDatabase[selectedCid] || []).map(a => a.toString().trim());
            if (targetAccounts.length === 0) { alert('該 CID 在雲端中無對應帳號，無法篩選合併！'); return; }

            resultContainer.innerHTML = `⏳ 正在跨檔案進行【同名分頁】串聯並依 [${selectedCid}] 盲篩中...`;
            
            let store = {}; // 格式: { "分頁A": { header: [], rows: [] } }

            try {
                for (let file of files) {
                    const arrayBuffer = await readFileAsync(file);
                    const workbook = XLSX.read(arrayBuffer, { type: 'array', cellDates: true, raw: false });
                    
                    workbook.SheetNames.forEach(name => {
                        const worksheet = workbook.Sheets[name];
                        const rawRows = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });
                        if (rawRows.length === 0) return;

                        if (!store[name]) {
                            store[name] = { header: rawRows[0], rows: [] };
                        }

                        for (let i = 1; i < rawRows.length; i++) {
                            if (!rawRows[i] || rawRows[i].length === 0) continue;
                            const hasMatch = rawRows[i].some(cellVal => {
                                if (cellVal === undefined || cellVal === null) return false;
                                return targetAccounts.includes(cellVal.toString().trim());
                            });
                            if (hasMatch) store[name].rows.push(rawRows[i]);
                        }
                    });
                }

                let summary = [];
                let validSheetsCount = 0;

                Object.keys(store).forEach(sName => {
                    // 🌟 核心剔除邏輯：合併後如果分頁內完全沒有資料，直接跳過，不生成空分頁
                    if (store[sName].rows.length === 0) return;

                    let finalRows = [store[sName].header, ...store[sName].rows];
                    let cleanedName = `${sName}_${selectedCid}`.replace(/[:\\/?*\[\]]/g, "_").substring(0, 31);
                    
                    XLSX.utils.book_append_sheet(currentMergeWorkbook, XLSX.utils.aoa_to_sheet(finalRows), cleanedName);
                    summary.push(`<li>分頁 [${cleanedName}]: 跨檔串聯篩出 <b>${store[sName].rows.length}</b> 筆明細</li>`);
                    validSheetsCount++;
                });

                if (validSheetsCount === 0) {
                    resultContainer.innerHTML = `<div style="color: #dc3545; font-weight: bold; padding: 20px;">⚠️ 合併完成：在所有檔案的同名分頁串聯中，皆未發現相符的 CID 名單，已取消導出空檔。</div>`;
                    return;
                }

                XLSX.writeFile(currentMergeWorkbook, `好好篩_跨檔同名分頁合併_${selectedCid}_${getSafeDateString()}.xlsx`);

                resultContainer.classList.remove('result-placeholder');
                resultContainer.innerHTML = `
                    <div class="download-box" style="background-color: #f3f0fa; border-color: #6f42c1;">
                        <div style="color: #6f42c1; font-weight: bold; font-size: 16px; margin-bottom: 12px;">🎉 跨檔同名分頁合併成功！(已過濾空分頁)</div>
                        <button class="btn btn-purple" style="font-size: 15px; padding: 14px;" onclick="triggerMergeDownload()">💾 下載模式 C 同名合併 Excel 檔</button>
                    </div>
                    <div class="report-list">
                        <p style="font-weight:bold; margin:0; color:#495057;">合併任務報告：</p>
                        <ul>${summary.join('')}</ul>
                    </div>
                `;

            } catch (err) {
                console.error(err);
                resultContainer.innerHTML = `<div style="color: #dc3545;">❌ 執行跨檔同名串聯時發生錯誤。</div>`;
            }
        }
    }

    function triggerMergeDownload() {
        if (!currentMergeWorkbook) return;
        XLSX.writeFile(currentMergeWorkbook, `好好篩_多檔物理合併_${getSafeDateString()}.xlsx`);
    }
</script>

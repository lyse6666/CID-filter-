<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>好好篩 - 跨瀏覽器、跨裝置雲端資料庫同步系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #007bff;
            margin-bottom: 5px;
            font-size: 28px;
            font-weight: bold;
        }
        .header p {
            color: #666;
            margin: 0;
            font-size: 14px;
        }
        .main-content {
            max-width: 1100px;
            margin: auto;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .column-left {
            flex: 1;
            min-width: 320px;
        }
        .column-right {
            flex: 1.2;
            min-width: 350px;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #eaeaea;
        }
        .card h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 16px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input[type="text"], select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        textarea {
            height: 120px;
            resize: vertical;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 8px;
        }
        .btn:last-child {
            margin-bottom: 0;
        }
        .btn-blue {
            background-color: #007bff;
            color: white;
        }
        .btn-blue:hover { background-color: #0056b3; }
        .btn-green {
            background-color: #28a745;
            color: white;
        }
        .btn-green:hover { background-color: #218838; }
        .btn-orange {
            background-color: #fd7e14;
            color: white;
        }
        .btn-orange:hover { background-color: #e0630d; }
        .btn-purple {
            background-color: #6f42c1;
            color: white;
        }
        .btn-purple:hover { background-color: #59359a; }
        .btn-danger {
            background-color: #fff;
            color: #dc3545;
            border: 1px solid #dc3545;
            padding: 6px 12px;
            width: auto;
            font-size: 12px;
            margin-top: 15px;
            border-radius: 4px;
        }
        .btn-danger:hover { background-color: #fff5f5; }
        .status-text {
            font-size: 14px;
            font-weight: bold;
            margin-top: 10px;
        }
        .status-success { color: #28a745; }
        .status-error { color: #dc3545; }
        .status-loading { color: #ffc107; }
        .list-container {
            margin-top: 15px;
            font-size: 14px;
            max-height: 250px;
            overflow-y: auto;
        }
        .result-placeholder {
            text-align: center;
            color: #888;
            padding: 40px 20px;
            font-size: 14px;
        }
        .radio-group {
            display: flex;
            gap: 15px;
            margin-top: 5px;
            font-size: 14px;
        }
        .radio-group label {
            font-weight: normal !important;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }
        .download-box {
            background-color: #e8f4fd;
            border: 2px dashed #007bff;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
        }
        .report-list {
            text-align: left;
            padding: 10px 15px;
            font-size: 13px;
            background: #f8f9fa;
            border-radius: 6px;
            border: 1px solid #dee2e6;
            margin-top: 10px;
        }
        .report-list ul { margin: 5px 0 0 0; padding-left: 20px; }

        .custom-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.4);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .modal-header {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-body {
            max-height: 250px;
            overflow-y: auto;
            font-size: 14px;
        }
        .modal-account-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
            border-bottom: 1px dashed #eee;
        }
        .modal-account-item:hover {
            background-color: #f8f9fa;
        }
        .btn-inline-del {
            color: #dc3545;
            cursor: pointer;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }
        .btn-inline-del:hover {
            background-color: #fff5f5;
        }
        .cid-item-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            margin: 5px 0;
            background-color: #f8f9fa;
            border-radius: 5px;
            border: 1px solid #e9ecef;
            font-size: 13px;
        }
        .cid-click-area {
            flex: 1;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>好好篩</h1>
    <p>📊 跨瀏覽器、跨裝置雲端資料庫同步系統</p>
</div>

<div class="main-content">
    <div class="column-left">
        <div class="card">
            <h3>儲存 CID 名單</h3>
            <div class="form-group">
                <label>CID 名稱：</label>
                <input type="text" id="cidName" placeholder="請輸入 CID 識別名稱 (如：BT0052)">
            </div>
            <div class="form-group">
                <label>該 CID 底下的 Account Name 名單 (每行一個)：</label>
                <textarea id="accountList" placeholder="請輸入或貼上此 CID 包含的所有帳號名稱..."></textarea>
            </div>
            <button class="btn btn-blue" onclick="saveToCloud()">儲存 / 追加並同步到雲端</button>
            
            <div style="border-top: 1px dashed #ddd; margin-top: 20px; padding-top: 15px;">
                <label style="font-size: 13px; font-weight: bold; display: block; margin-bottom: 5px;">目前已儲存的 CID 名單 (資料已與雲端同步) ：</label>
                <div id="syncStatus" class="status-text status-loading">⏳ 正在同步雲端選單...</div>
                <div id="cidListContainer" class="list-container"></div>
                <button class="btn btn-danger" onclick="clearAllRecords()">清除所有紀錄名單</button>
            </div>
        </div>
    </div>

    <div class="column-right">
        <div class="card">
            <h3>選擇 CID 與單檔篩選工具</h3>
            <div class="form-group">
                <label>請選擇本次要篩選的 CID：</label>
                <select id="cidSelect">
                    <option value="">-- 目前無有效 CID --</option>
                </select>
            </div>
            <div class="form-group">
                <label>上傳待篩選的原始 Excel 檔案：</label>
                <input type="file" id="excelFile" accept=".xlsx, .xls">
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-green" style="flex: 1;" onclick="startFiltering(false)">📄 篩選第一分頁</button>
                <button class="btn btn-orange" style="flex: 1;" onclick="startFiltering(true)">🎯 獨立篩選全分頁</button>
            </div>
            <p style="font-size: 11px; color: #888; margin: 5px 0 0 0;">註：此功能採用物理複製整行過濾算法，100% 完美保留原始 Excel 的時間日期與欄位格式。</p>
        </div>

        <div class="card">
            <h3>🗂️ Excel 多檔案合併匯出工具</h3>
            <div class="form-group">
                <label>上傳多個 Excel 檔案 (可多選)：</label>
                <input type="file" id="mergeFiles" accept=".xlsx, .xls" multiple>
            </div>
            <div class="form-group">
                <label>匯出模式選擇：</label>
                <div class="radio-group">
                    <label><input type="radio" name="mergeMode" value="single" checked> 模式 A：合併至單一分頁</label>
                    <label><input type="radio" name="mergeMode" value="multi"> 模式 B：一檔案一分頁</label>
                    <label><input type="radio" name="mergeMode" value="same"> 模式 C：依相同分頁名串聯</label>
                </div>
            </div>
            <button class="btn btn-purple" onclick="startMergeAndExport()">建立合併並下載 Excel 檔</button>
        </div>

        <div class="card">
            <h3>執行結果與下載區</h3>
            <div id="resultContainer" class="result-placeholder">
                請選擇功能並上傳對應檔案進行操作。
            </div>
        </div>
    </div>
</div>

<div id="accountDetailModal" class="custom-modal">
    <div class="modal-content">
        <div class="modal-header">
            <span id="modalTitle">CID 帳號明細</span>
            <span style="cursor:pointer; font-size: 20px; color:#888;" onclick="closeModal()">&times;</span>
        </div>
        <div id="modalBody" class="modal-body"></div>
        <div style="text-align: right; margin-top: 15px;">
            <button class="btn btn-blue" style="width: auto; padding: 6px 15px; margin: 0;" onclick="closeModal()">關閉</button>
        </div>
    </div>
</div>

<script>
    const CLOUD_API_URL = "https://script.google.com/macros/s/AKfycbzl9xqYS9rH9ErNC5IDlQ9Q2L0CI4G4AXqOLezhc_1t1Vof3lcsQEHUvCIZ8eZyXRao/exec";
    
    let cloudDatabase = {};
    let currentFilterWorkbook = null;
    let currentMergeWorkbook = null;

    function getSafeDateString() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    window.onload = function() {
        const localBackup = localStorage.getItem('backup_cloud_db');
        if (localBackup) {
            try { cloudDatabase = JSON.parse(localBackup); } catch(e) { cloudDatabase = {}; }
        }
        updateCidDropdownAndList();
        loadFromCloud();
    };

    function loadFromCloud() {
        const statusDiv = document.getElementById('syncStatus');
        fetch(`${CLOUD_API_URL}?fetch=1`, { method: "GET", mode: "cors", redirect: "follow" })
        .then(res => res.json())
        .then(data => {
            if (data && Object.keys(data).length > 0) {
                cloudDatabase = data;
                localStorage.setItem('backup_cloud_db', JSON.stringify(cloudDatabase));
                if (statusDiv) {
                    statusDiv.className = "status-text status-success";
                    statusDiv.innerText = "🟢 已與雲端 Sheet 成功連動同步";
                }
                updateCidDropdownAndList();
            } else {
                if (statusDiv) {
                    statusDiv.className = "status-text status-success";
                    statusDiv.innerText = "🟢 雲端目前無歷史名單，請輸入新名單破冰連動";
                }
            }
        })
        .catch(err => {
            console.error("讀取失敗:", err);
            if (statusDiv) {
                statusDiv.className = "status-text status-error";
                statusDiv.innerText = "❌ 讀取失敗，使用離線備份模式運作中";
            }
        });
    }

    function updateCidDropdownAndList() {
        const select = document.getElementById('cidSelect');
        const listContainer = document.getElementById('cidListContainer');
        if (!select || !listContainer) return;

        select.innerHTML = '';
        listContainer.innerHTML = '';
        const cids = Object.keys(cloudDatabase);

        if (cids.length === 0) {
            const opt = document.createElement('option');
            opt.value = ""; opt.text = "-- 目前無有效 CID --";
            select.appendChild(opt);
            listContainer.innerText = "目前無已儲存的名單。";
            return;
        }

        cids.forEach(cid => {
            const opt = document.createElement('option');
            opt.value = cid; opt.text = cid;
            select.appendChild(opt);

            const wrapper = document.createElement('div');
            wrapper.className = "cid-item-wrapper";

            const clickArea = document.createElement('div');
            clickArea.className = "cid-click-area";
            clickArea.innerText = `• ${cid} (${cloudDatabase[cid].length || 0} 筆帳號) 🔍`;
            clickArea.onclick = function() { openAccountModal(cid); };

            const delBtn = document.createElement('span');
            delBtn.className = "btn-inline-del";
            delBtn.innerHTML = "❌";
            delBtn.onclick = function(e) { e.stopPropagation(); deleteEntireCid(cid); };

            wrapper.appendChild(clickArea);
            wrapper.appendChild(delBtn);
            listContainer.appendChild(wrapper);
        });
    }

    function saveToCloud() {
        try {
            const cidNameInput = document.getElementById('cidName');
            const accountListInput = document.getElementById('accountList');
            const statusDiv = document.getElementById('syncStatus');

            if (!cidNameInput || !accountListInput) return;

            const cidName = cidNameInput.value.trim();
            const accountListText = accountListInput.value.trim();

            if (!cidName || !accountListText) { alert("請輸入完整的 CID 名稱與帳號名單！"); return; }
            const accounts = accountListText.split('\n').map(a => a.trim()).filter(a => a);
            
            if (!cloudDatabase[cidName]) cloudDatabase[cidName] = [];
            cloudDatabase[cidName] = Array.from(new Set([...cloudDatabase[cidName], ...accounts]));
            localStorage.setItem('backup_cloud_db', JSON.stringify(cloudDatabase));
            
            updateCidDropdownAndList();
            cidNameInput.value = '';
            accountListInput.value = '';

            if (statusDiv) {
                statusDiv.className = "status-text status-loading";
                statusDiv.innerText = "⏳ 正在同步更新至雲端 Sheet...";
            }

            fetch(CLOUD_API_URL, {
                method: 'POST',
                mode: 'no-cors', 
                body: JSON.stringify({ cid: cidName, accounts: accounts, action: "save" })
            }).then(() => {
                setTimeout(loadFromCloud, 1500);
            }).catch(e => console.log("發送失敗", e));

        } catch (error) {
            alert("操作異常，請重新整理頁面。");
        }
    }

    function openAccountModal(cid) {
        const modal = document.getElementById('accountDetailModal');
        const title = document.getElementById('modalTitle');
        const body = document.getElementById('modalBody');
        if(!modal || !title || !body) return;

        title.innerText = `【 ${cid} 】儲存的 Account 明細`;
        body.innerHTML = '';
        const accounts = cloudDatabase[cid] || [];
        accounts.forEach(acc => {
            const row = document.createElement('div');
            row.className = "modal-account-item";
            row.innerHTML = `<span>${acc}</span><span class="btn-inline-del" onclick="deleteSingleAccount('${cid}', '${acc}')">❌</span>`;
            body.appendChild(row);
        });
        modal.style.display = 'flex';
    }

    function closeModal() { 
        const modal = document.getElementById('accountDetailModal');
        if(modal) modal.style.display = 'none'; 
    }

    function deleteSingleAccount(cid, accountName) {
        if (!confirm(`確定要單獨刪除帳號【${accountName}】嗎？`)) return;
        closeModal();
        if (cloudDatabase[cid]) cloudDatabase[cid] = cloudDatabase[cid].filter(a => a !== accountName);
        localStorage.setItem('backup_cloud_db', JSON.stringify(cloudDatabase));
        updateCidDropdownAndList();
        fetch(CLOUD_API_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ cid: cid, account: accountName, action: "deleteAccount" })
        }).then(() => {
            setTimeout(loadFromCloud, 1500);
        });
    }

    function deleteEntireCid(cid) {
        if (!confirm(`確定要完全刪除【${cid}】整個群組名單嗎？`)) return;
        delete cloudDatabase[cid];
        localStorage.setItem('backup_cloud_db', JSON.stringify(cloudDatabase));
        updateCidDropdownAndList();
        fetch(CLOUD_API_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ cid: cid, action: "deleteCid" })
        }).then(() => {
            setTimeout(loadFromCloud, 1500);
        });
    }

    function clearAllRecords() {
        if (!confirm("確定要完全清除並重置所有歷史紀錄嗎？")) return;
        cloudDatabase = {};
        localStorage.setItem('backup_cloud_db', "{}");
        updateCidDropdownAndList();
        fetch(CLOUD_API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "clearAll" }) })
        .then(() => {
            setTimeout(loadFromCloud, 1500);
        });
    }

    // 🎯 精準安全篩選核心演算法 (100% 杜絕格式錯亂與數據被改問題)
    function startFiltering(processAllSheets = false) {
        const selectedCid = document.getElementById('cidSelect').value;
        const fileInput = document.getElementById('excelFile');
        const resultContainer = document.getElementById('resultContainer');

        if (!selectedCid) { alert('請先選擇你要篩選的 CID 名單！'); return; }
        if (!fileInput.files || fileInput.files.length === 0) { alert('請上傳你要篩選的 Excel 檔案！'); return; }

        const targetAccounts = (cloudDatabase[selectedCid] || []).map(a => a.toString().trim());
        resultContainer.innerHTML = processAllSheets ? "⏳ 全部分頁正在進行物理拷貝篩選中..." : "⏳ 正在處理第一分頁原始格式保護篩選...";

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array', cellDates: true, cellStyles: true });
                
                currentFilterWorkbook = XLSX.utils.book_new();
                let summary = []; 
                let validSheetCount = 0;

                const sheetsToProcess = processAllSheets ? workbook.SheetNames : [workbook.SheetNames[0]];

                sheetsToProcess.forEach(name => {
                    const origSheet = workbook.Sheets[name];
                    const rawRows = XLSX.utils.sheet_to_json(origSheet, { header: 1, defval: "" });
                    if (rawRows.length === 0) return;

                    let keepRowIndexes = [0]; 
                    let matchCount = 0;

                    for (let i = 1; i < rawRows.length; i++) {
                        if (!rawRows[i] || rawRows[i].length === 0) continue;
                        const hasMatch = rawRows[i].some(cellVal => {
                            if (cellVal === null || cellVal === undefined) return false;
                            return targetAccounts.includes(cellVal.toString().trim());
                        });
                        if (hasMatch) {
                            keepRowIndexes.push(i);
                            matchCount++;
                        }
                    }

                    if (matchCount === 0 && processAllSheets) return;

                    const clonedSheet = Object.assign({}, origSheet);
                    const range = XLSX.utils.decode_range(clonedSheet['!ref']);
                    const totalRows = range.e.r + 1;

                    let keepMap = {};
                    keepRowIndexes.forEach(idx => { keepMap[idx] = true; });

                    for (let r = 0; r < totalRows; r++) {
                        if (!keepMap[r]) {
                            for (let c = range.s.c; c <= range.e.c; c++) {
                                const cellRef = XLSX.utils.encode_cell({ r: r, c: c });
                                delete clonedSheet[cellRef];
                            }
                        }
                    }

                    let newSheet = {};
                    let currentNewRow = 0;

                    for (let r = 0; r < totalRows; r++) {
                        if (keepMap[r]) {
                            let hasCellInRow = false;
                            for (let c = range.s.c; c <= range.e.c; c++) {
                                const oldCellRef = XLSX.utils.encode_cell({ r: r, c: c });
                                if (clonedSheet[oldCellRef]) {
                                    const newCellRef = XLSX.utils.encode_cell({ r: currentNewRow, c: c });
                                    newSheet[newCellRef] = clonedSheet[oldCellRef];
                                    hasCellInRow = true;
                                }
                            }
                            if (hasCellInRow || r === 0) {
                                currentNewRow++;
                            }
                        }
                    }

                    range.e.r = Math.max(0, currentNewRow - 1);

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>好好篩</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #f0f2f5; color: #333; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { color: #007bff; margin: 0; font-size: 26px; }
        .main-content { max-width: 1100px; margin: auto; display: flex; gap: 20px; flex-wrap: wrap; }
        .column-left { flex: 1; min-width: 320px; }
        .column-right { flex: 1.2; min-width: 350px; }
        .card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eaeaea; }
        .card h3 { margin-top: 0; margin-bottom: 15px; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 10px; color: #444; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        textarea { height: 110px; resize: vertical; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 8px; }
        .btn:last-child { margin-bottom: 0; }
        .btn-blue { background-color: #007bff; color: white; }
        .btn-blue:hover { background-color: #0056b3; }
        .btn-green { background-color: #28a745; color: white; }
        .btn-green:hover { background-color: #218838; }
        .btn-orange { background-color: #fd7e14; color: white; }
        .btn-orange:hover { background-color: #e0630d; }
        .btn-purple { background-color: #6f42c1; color: white; }
        .btn-purple:hover { background-color: #59359a; }
        .btn-danger { background-color: #fff; color: #dc3545; border: 1px solid #dc3545; padding: 6px 12px; width: auto; font-size: 12px; margin-top: 15px; border-radius: 4px; }
        .btn-danger:hover { background-color: #fff5f5; }
        .status-text { font-size: 14px; font-weight: bold; margin-top: 10px; }
        .status-success { color: #28a745; }
        .status-error { color: #dc3545; }
        .status-loading { color: #ffc107; }
        .list-container { margin-top: 15px; font-size: 14px; max-height: 220px; overflow-y: auto; }
        .result-placeholder { text-align: center; color: #888; padding: 30px 20px; font-size: 14px; }
        .radio-group { display: flex; gap: 15px; margin-top: 5px; font-size: 14px; }
        .radio-group label { font-weight: normal !important; display: flex; align-items: center; gap: 4px; cursor: pointer; }
        .download-box { background-color: #e8f4fd; border: 2px dashed #007bff; border-radius: 6px; padding: 15px; text-align: center; }
        
        .custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.4); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; width: 90%; max-width: 450px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .modal-header { font-size: 16px; font-weight: bold; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { max-height: 250px; overflow-y: auto; font-size: 14px; }
        .modal-account-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; border-bottom: 1px dashed #eee; }
        .btn-inline-del { color: #dc3545; cursor: pointer; font-weight: bold; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
        .cid-item-wrapper { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; margin: 5px 0; background-color: #f8f9fa; border-radius: 5px; border: 1px solid #e9ecef; font-size: 13px; }
        .cid-click-area { flex: 1; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1>好好篩</h1>
</div>

<div class="main-content">
    <div class="column-left">
        <div class="card">
            <h3>儲存 CID 名單</h3>
            <div class="form-group">
                <label>CID 名稱：</label>
                <input type="text" id="cidName" placeholder="例如：BT0052">
            </div>
            <div class="form-group">
                <label>Account Name 名單 (每行一個)：</label>
                <textarea id="accountList" placeholder="請貼上該 CID 的所有帳號..."></textarea>
            </div>
            <button class="btn btn-blue" onclick="saveToCloud()">儲存並同步到雲端</button>
            
            <div style="border-top: 1px dashed #ddd; margin-top: 20px; padding-top: 15px;">
                <label style="font-size: 13px; font-weight: bold;">目前已儲存的 CID 清單：</label>
                <div id="syncStatus" class="status-text status-loading">⏳ 正在同步雲端選單...</div>
                <div id="cidListContainer" class="list-container"></div>
                <button class="btn btn-danger" onclick="clearAllRecords()">清除所有紀錄</button>
            </div>
        </div>
    </div>

    <div class="column-right">
        <div class="card">
            <h3>選擇 CID 與單檔篩選</h3>
            <div class="form-group">
                <label>選擇本次要篩選的 CID：</label>
                <select id="cidSelect">
                    <option value="">-- 目前無有效 CID --</option>
                </select>
            </div>
            <div class="form-group">
                <label>上傳待篩選的原始 Excel 檔案：</label>
                <input type="file" id="excelFile" accept=".xlsx, .xls">
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-green" style="flex: 1;" onclick="startFiltering(false)">📄 篩選第一分頁</button>
                <button class="btn btn-orange" style="flex: 1;" onclick="startFiltering(true)">🎯 篩選全部分頁</button>
            </div>
        </div>

        <div class="card">
            <h3>🗂️ Excel 多檔案合併工具</h3>
            <div class="form-group">
                <label>上傳多個 Excel 檔案 (可複選)：</label>
                <input type="file" id="mergeFiles" accept=".xlsx, .xls" multiple>
            </div>
            <div class="form-group">
                <label>匯出模式選擇：</label>
                <div class="radio-group">
                    <input type="radio" id="modeSingle" name="mergeMode" value="single" checked>
                    <label for="modeSingle"> 模式 A：合併至單一分頁</label>
                    <input type="radio" id="modeMulti" name="mergeMode" value="multi">
                    <label for="modeMulti"> 模式 B：一檔案一分頁</label>
                </div>
            </div>
            <button class="btn btn-purple" onclick="startMergeAndExport()">建立合併並下載</button>
        </div>

        <div class="card">
            <h3>執行結果與下載</h3>
            <div id="resultContainer" class="result-placeholder">
                請選擇上方功能進行操作。
            </div>
        </div>
    </div>
</div>

<div id="accountDetailModal" class="custom-modal">
    <div class="modal-content">
        <div class="modal-header">
            <span id="modalTitle">帳號明細</span>
            <span style="cursor:pointer; font-size: 20px; color:#888;" onclick="closeModal()">&times;</span>
        </div>
        <div id="modalBody" class="modal-body"></div>
        <div style="text-align: right; margin-top: 15px;">
            <button class="btn btn-blue" style="width: auto; padding: 6px 15px; margin: 0;" onclick="closeModal()">關閉</button>
        </div>
    </div>
</div>

<script>
    const CLOUD_API_URL = "https://script.google.com/macros/s/AKfycbzl9xqYS9rH9ErNC5IDlQ9Q2L0CI4G4AXqOLezhc_1t1Vof3lcsQEHUvCIZ8eZyXRao/exec";
    let cloudDatabase = {};

    function getSafeDateString() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    window.onload = function() {
        const localBackup = localStorage.getItem('backup_cloud_db');
        if (localBackup) { try { cloudDatabase = JSON.parse(localBackup); } catch(e) { cloudDatabase = {}; } }
        updateCidDropdownAndList();
        loadFromCloud();
    };

    function loadFromCloud() {
        const statusDiv = document.getElementById('syncStatus');
        fetch(`${CLOUD_API_URL}?fetch=1`, { method: "GET", mode: "cors", redirect: "follow" })
        .then(res => res.json())
        .then(data => {
            if (data && Object.keys(data).length > 0) {
                cloudDatabase = data;
                localStorage.setItem('backup_cloud_db', JSON.stringify(cloudDatabase));
                if (statusDiv) { statusDiv.className = "status-text status-success"; statusDiv.innerText = "🟢 雲端同步成功"; }
                updateCidDropdownAndList();
            } else {
                if (statusDiv) { statusDiv.className = "status-text status-success"; statusDiv.innerText = "🟢 雲端目前無資料"; }
            }
        })
        .catch(err => {
            if (statusDiv) { statusDiv.className = "status-text status-error"; statusDiv.innerText = "❌ 網路異常，目前使用離線備份模式"; }
        });
    }

    function updateCidDropdownAndList() {
        const select = document.getElementById('cidSelect');
        const listContainer = document.getElementById('cidListContainer');
        if (!select || !listContainer) return;

        select.innerHTML = ''; listContainer.innerHTML = '';
        const cids = Object.keys(cloudDatabase);

        if (cids.length === 0) {
            const opt = document.createElement('option'); opt.value = ""; opt.text = "-- 目前無有效 CID --";
            select.appendChild(opt); listContainer.innerText = "目前無已儲存的名單。"; return;
        }

        cids.forEach(cid => {
            const opt = document.createElement('option'); opt.value = cid; opt.text = cid;
            select.appendChild(opt);

            const wrapper = document.createElement('div'); wrapper.className = "cid-item-wrapper";
            const clickArea = document.createElement('div'); clickArea.className = "cid-click-area";
            clickArea.innerText = `• ${cid} (${cloudDatabase[cid].length || 0} 筆帳號) 🔍`;
            clickArea.onclick = function() { openAccountModal(cid); };

            const delBtn = document.createElement('span'); delBtn.className = "btn-inline-del"; delBtn.innerHTML = "❌";
            delBtn.onclick = function(e) { e.stopPropagation(); deleteEntireCid(cid); };

            wrapper.appendChild(clickArea); wrapper.appendChild(delBtn);
            listContainer.appendChild(wrapper);
        });
    }

    function saveToCloud() {
        const cidNameInput = document.getElementById('cidName');
        const accountListInput = document.getElementById('accountList');
        if (!cidNameInput || !accountListInput) return;

        const cidName = cidNameInput.value.trim();
        const accountListText = accountListInput.value.trim();
        if (!cidName || !accountListText) { alert("請輸入完整的 CID 名稱與帳號名單！"); return; }
        
        const accounts = accountListText.split('\n').map(a => a.trim()).filter(a => a);
        if (!cloudDatabase[cidName]) cloudDatabase[cidName] = [];
        cloudDatabase[cidName] = Array.from(new Set([...cloudDatabase[cidName], ...accounts]));
        localStorage.setItem('backup_cloud_db', JSON.stringify(cloudDatabase));
        
        updateCidDropdownAndList();
        cidNameInput.value = ''; accountListInput.value = '';

        document.getElementById('syncStatus').innerText = "⏳ 正在同步更新至雲端...";
        fetch(CLOUD_API_URL, {
            method: 'POST', mode: 'no-cors', body: JSON.stringify({ cid: cidName, accounts: accounts, action: "save" })
        }).then(() => { setTimeout(loadFromCloud, 1200); });
    }

    function openAccountModal(cid) {
        const modal = document.getElementById('accountDetailModal');
        const title = document.getElementById('modalTitle');
        const body = document.getElementById('modalBody');
        if(!modal || !title || !body) return;

        title.innerText = `【 ${cid} 】帳號明細`; body.innerHTML = '';
        (cloudDatabase[cid] || []).forEach(acc => {
            const row = document.createElement('div'); row.className = "modal-account-item";
            row.innerHTML = `<span>${acc}</span><span class="btn-inline-del" onclick="deleteSingleAccount('${cid}', '${acc}')">❌</span>`;
            body.appendChild(row);
        });
        modal.style.display = 'flex';
    }

    function closeModal() { document.getElementById('accountDetailModal').style.display = 'none'; }

    function deleteSingleAccount(cid, accountName) {
        if (!confirm(`確定刪除帳號【${accountName}】？`)) return;
        closeModal();
        if (cloudDatabase[cid]) cloudDatabase[cid] = cloudDatabase[cid].filter(a => a !== accountName);
        localStorage.setItem('backup_cloud_db', JSON.stringify(cloudDatabase));
        updateCidDropdownAndList();
        fetch(CLOUD_API_URL, {
            method: 'POST', mode: 'no-cors', body: JSON.stringify({ cid: cid, account: accountName, action: "deleteAccount" })
        }).then(() => { setTimeout(loadFromCloud, 1200); });
    }

    function deleteEntireCid(cid) {
        if (!confirm(`確定完全刪除【${cid}】群組？`)) return;
        delete cloudDatabase[cid];
        localStorage.setItem('backup_cloud_db', JSON.stringify(cloudDatabase));
        updateCidDropdownAndList();
        fetch(CLOUD_API_URL, {
            method: 'POST', mode: 'no-cors', body: JSON.stringify({ cid: cid, action: "deleteCid" })
        }).then(() => { setTimeout(loadFromCloud, 1200); });
    }

    function clearAllRecords() {
        if (!confirm("確定要完全清除所有紀錄？")) return;
        cloudDatabase = {}; localStorage.setItem('backup_cloud_db', "{}");
        updateCidDropdownAndList();
        fetch(CLOUD_API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "clearAll" }) })
        .then(() => { setTimeout(loadFromCloud, 1200); });
    }

    // ================= 功能一：單檔篩選 (完整保留您的格式保護優化核心) =================
    function startFiltering(processAllSheets = false) {
        const selectedCid = document.getElementById('cidSelect').value;
        const fileInput = document.getElementById('excelFile');
        const resultContainer = document.getElementById('resultContainer');

        if (!selectedCid) { alert('請選擇篩選 CID 名單！'); return; }
        if (!fileInput.files || fileInput.files.length === 0) { alert('請上傳 Excel 檔案！'); return; }

        const targetAccounts = (cloudDatabase[selectedCid] || []).map(a => a.toString().trim());
        resultContainer.innerHTML = "⏳ 正在處理格式保護篩選...";

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array', cellDates: true, cellStyles: true });
                const newWorkbook = XLSX.utils.book_new();
                let sheetsToProcess = processAllSheets ? workbook.SheetNames : [workbook.SheetNames[0]];

                sheetsToProcess.forEach(name => {
                    const origSheet = workbook.Sheets[name];
                    if (!origSheet || !origSheet['!ref']) return;

                    const rawRows = XLSX.utils.sheet_to_json(origSheet, { header: 1, defval: "" });
                    if (rawRows.length === 0) return;

                    let keepRowIndexes = [0]; 
                    for (let i = 1; i < rawRows.length; i++) {
                        if (!rawRows[i] || rawRows[i].length === 0) continue;
                        const hasMatch = rawRows[i].some(cellVal => {
                            if (cellVal === null || cellVal === undefined) return false;
                            return targetAccounts.includes(cellVal.toString().trim());
                        });
                        if (hasMatch) keepRowIndexes.push(i);
                    }

                    if (keepRowIndexes.length <= 1 && processAllSheets) return;

                    const clonedSheet = Object.assign({}, origSheet);
                    const range = XLSX.utils.decode_range(clonedSheet['!ref']);
                    const totalRows = range.e.r + 1;

                    let keepMap = {}; keepRowIndexes.forEach(idx => { keepMap[idx] = true; });
                    let newSheet = {}; let currentNewRow = 0;

                    for (let r = 0; r < totalRows; r++) {
                        if (keepMap[r]) {
                            let hasCellInRow = false;
                            for (let c = range.s.c; c <= range.e.c; c++) {
                                const oldCellRef = XLSX.utils.encode_cell({ r: r, c: c });
                                if (clonedSheet[oldCellRef]) {
                                    const newCellRef = XLSX.utils.encode_cell({ r: currentNewRow, c: c });
                                    newSheet[newCellRef] = clonedSheet[oldCellRef];
                                    hasCellInRow = true;
                                }
                            }
                            if (hasCellInRow || r === 0) currentNewRow++;
                        }
                    }

                    if (currentNewRow > 0) {
                        const newRange = { s: { c: range.s.c, r: 0 }, e: { c: range.e.c, r: Math.max(0, currentNewRow - 1) } };
                        newSheet['!ref'] = XLSX.utils.encode_range(newRange);
                        if (clonedSheet['!cols']) newSheet['!cols'] = clonedSheet['!cols'];
                        if (clonedSheet['!merges']) newSheet['!merges'] = clonedSheet['!merges'];
                        XLSX.utils.book_append_sheet(newWorkbook, newSheet, name);
                    }
                });

                if (newWorkbook.SheetNames.length === 0) {
                    resultContainer.innerHTML = `<div class="status-text status-error">❌ 找不到任何匹配的 Account 資料！</div>`; return;
                }

                const outData = XLSX.write(newWorkbook, { bookType: 'xlsx', type: 'array' });
                const blob = new Blob([outData], { type: 'application/octet-stream' });
                const dlUrl = URL.createObjectURL(blob);
                const outName = `好好篩_${selectedCid}_${getSafeDateString()}.xlsx`;

                resultContainer.innerHTML = `
                    <div class="download-box">
                        <p style="color:#28a745; font-weight:bold; margin-top:0;">🎉 格式篩選成功！</p>
                        <a href="${dlUrl}" download="${outName}" class="btn btn-green" style="display:inline-block; width:auto; padding:10px 25px; text-decoration:none;">📥 下載篩選後 Excel</a>
                    </div>`;
            } catch (err) {
                resultContainer.innerHTML = `<div class="status-text status-error">❌ 篩選失敗，請確認檔案。</div>`;
            }
        };
        reader.readAsArrayBuffer(file);
    }

    // ================= 功能二：多檔合併 (極致字串流優化 - 零物件消耗，永不崩潰) =================
    async function startMergeAndExport() {
        const fileInput = document.getElementById('mergeFiles');
        const modeElement = document.querySelector('input[name="mergeMode"]:checked');
        const resultContainer = document.getElementById('resultContainer');

        if (!fileInput.files || fileInput.files.length === 0) { alert('請選擇至少一個 Excel 檔案！'); return; }
        if (!modeElement) return;

        const mode = modeElement.value;
        const files = Array.from(fileInput.files);
        
        let modeA_CsvStream = ""; // 模式A：純字串累加，完全不佔用多餘記憶體空間
        let hasHeaderLoaded = false; 
        let sheetNameCounters = {};
        let modeB_SheetsWorkbook = XLSX.utils.book_new(); // 模式B專用

        // 核心非同步讀取函數
        const parseFileToStreamAsync = (file, index) => {
            return new Promise((resolve) => {
                resultContainer.innerHTML = `📊 正在高效率抽取第 (${index + 1} / ${files.length}) 個檔案：<br><b>${file.name}</b>`;
                
                let reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        let arrayBuffer = new Uint8Array(e.target.result);
                        let wb = XLSX.read(arrayBuffer, { type: 'array', cellDates: true, raw: true });
                        const firstSheetName = wb.SheetNames[0];

                        if (firstSheetName && wb.Sheets[firstSheetName]) {
                            const sheet = wb.Sheets[firstSheetName];
                            
                            if (mode === "single") {
                                // 【優化精髓】：直接將分頁壓成極輕量的 CSV 字串，完全不建立 JSON 物件！
                                let csvChunk = XLSX.utils.sheet_to_csv(sheet, { FS: ",", RS: "\n" });
                                
                                if (csvChunk && csvChunk.trim().length > 0) {
                                    if (!hasHeaderLoaded) {
                                        // 第一個檔案：完整保留（含首行標題欄位）
                                        modeA_CsvStream += csvChunk;
                                        if (!modeA_CsvStream.endsWith("\n")) modeA_CsvStream += "\n";
                                        hasHeaderLoaded = true;
                                    } else {
                                        // 第二個以後的檔案：直接切掉第一行標題，效率極高
                                        const firstLineBreak = csvChunk.indexOf("\n");
                                        if (firstLineBreak !== -1) {
                                            modeA_CsvStream += csvChunk.substring(firstLineBreak + 1);
                                            if (!modeA_CsvStream.endsWith("\n")) modeA_CsvStream += "\n";
                                        }
                                    }
                                }
                                csvChunk = null;
                            } else {
                                // 模式 B：各自保留獨立分頁
                                let wantedName = file.name.replace(/\.[^/.]+$/, "").substring(0, 30);
                                if (sheetNameCounters[wantedName]) {
                                    sheetNameCounters[wantedName]++;
                                    wantedName = wantedName.substring(0, 26) + "_" + sheetNameCounters[wantedName];
                                } else { sheetNameCounters[wantedName] = 1; }
                                XLSX.utils.book_append_sheet(modeB_SheetsWorkbook, sheet, wantedName);
                            }
                        }
                        // 釋放單檔記憶體
                        wb.Sheets = null; wb.SheetNames = null; wb = null;
                        arrayBuffer = null;
                    } catch (err) { console.error(err); }
                    
                    reader = null;
                    setTimeout(resolve, 60); // 留給瀏覽器微小的垃圾回收調度時間
                };
                reader.readAsArrayBuffer(file);
            });
        };

        // 序列執行，絕不併行
        for (let i = 0; i < files.length; i++) {
            await parseFileToStreamAsync(files[i], i);
        }

        // 打包與安全寫出
        resultContainer.innerHTML = "⏳ 正在包裝輸出 Excel 檔...";
        setTimeout(() => {
            try {
                let finalWorkbook;
                
                if (mode === "single") {
                    if (modeA_CsvStream.trim().length === 0) {
                        resultContainer.innerHTML = `<div class="status-text status-error">❌ 合併失敗：檔案內無有效資料！</div>`; return;
                    }
                    // 將完美的純字串一次性灌回分頁，安全無痛生成
                    finalWorkbook = XLSX.utils.book_new();
                    const rows = modeA_CsvStream.trim().split("\n").map(row => row.split(","));
                    const newSheet = XLSX.utils.aoa_to_sheet(rows);
                    XLSX.utils.book_append_sheet(finalWorkbook, newSheet, "綜合合併結果");
                    modeA_CsvStream = ""; 
                } else {
                    finalWorkbook = modeB_SheetsWorkbook;
                }

                // 輸出為 Excel 檔案
                const outData = XLSX.write(finalWorkbook, { bookType: 'xlsx', type: 'array' });
                const blob = new Blob([outData], { type: 'application/octet-stream' });
                const dlUrl = URL.createObjectURL(blob);
                const outName = `帳務多檔合併匯出_${getSafeDateString()}.xlsx`;

                resultContainer.innerHTML = `
                    <div class="download-box">
                        <p style="color:#6f42c1; font-weight:bold; margin-top:0;">🎉 檔案合併成功！</p>
                        <a href="${dlUrl}" download="${outName}" class="btn btn-purple" style="display:inline-block; width:auto; padding:10px 25px; text-decoration:none;">📥 下載已合併 Excel</a>
                    </div>`;
            } catch (e) {
                resultContainer.innerHTML = `<div class="status-text status-error">❌ 匯出失敗：資料量超出了瀏覽器極限。</div>`;
            }
        }, 150);
    }
</script>
</body>
</html>

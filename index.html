<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CID 篩選器</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #121212;
            color: #e0e0e0;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .search-box {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            box-sizing: border-box;
            background-color: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
        }
        .btn-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn {
            padding: 10px 15px;
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #444;
        }
        .btn.active {
            background-color: #007bff;
            border-color: #0056b3;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #1e1e1e;
        }
        th, td {
            border: 1px solid #444;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #2a2a2a;
            color: #007bff;
        }
        tr:nth-child(even) {
            background-color: #252525;
        }
        .status-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: #fff;
            font-weight: bold;
        }
        .status-on {
            background-color: #28a745;
        }
        .status-off {
            background-color: #dc3545;
        }
        .sync-status {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>CID 篩選器</h2>
    
    <div id="syncStatus" class="sync-status">正在嘗試連線雲端資料庫...</div>
    
    <input type="text" id="search" class="search-box" placeholder="輸入 CID 搜尋..." oninput="filterCIDs()">
    
    <div class="btn-container" id="btnContainer"></div>
    
    <div id="tableContainer"></div>
</div>

<script>
    // 鎖定您正確的 Google Apps Script 網址
    const CLOUD_API_URL = "https://script.google.com/macros/s/AKfycbwiGH4jtoY5qhe2__wOC9WBSy3QBOwne4laQIWaIT3H0rtj_tENU0iLaxTqjHD9Hrof/exec";

    let cidDatabase = {};
    let uploadedRawData = [];
    let finalFilteredData = [];
    let currentSelectedCid = "";

    window.onload = function() {
        // 網頁啟動時直接讀取雲端資料
        loadFromCloud();
    };

    function showSyncStatus(message) {
        document.getElementById('syncStatus').innerText = message;
    }

    // 自雲端撈取最新資料
    function loadFromCloud() {
        showSyncStatus("☁️ 正在自 Google 雲端資料庫讀取紀錄...");
        
        fetch(CLOUD_API_URL)
        .then(res => res.json())
        .then(data => {
            cidDatabase = data || {};
            showSyncStatus("✅ 雲端資料同步成功");
            parseUrlParams();
        })
        .catch(err => {
            console.error(err);
            showSyncStatus("❌ 讀取雲端資料失敗，請檢查權限設定");
            parseUrlParams();
        });
    }

    // 解析網址參數
    function parseUrlParams() {
        const urlParams = new URLSearchParams(window.location.search);
        const rawDataParam = urlParams.get('data');
        
        if (rawDataParam) {
            try {
                const decodedData = decodeURIComponent(rawDataParam);
                uploadedRawData = JSON.parse(decodedData);
                processUploadedData();
            } catch (e) {
                renderOnlyCloudData();
            }
        } else {
            renderOnlyCloudData();
        }
    }

    function processUploadedData() {
        const cids = new Set();
        finalFilteredData = [];

        uploadedRawData.forEach(item => {
            if (item.CID) {
                const cidStr = item.CID.toString().trim();
                cids.add(cidStr);
                
                let status = "開啟";
                if (cidDatabase[cidStr] !== undefined) {
                    status = cidDatabase[cidStr];
                }
                
                finalFilteredData.push({
                    ...item,
                    CID: cidStr,
                    status: status
                });
            }
        });

        renderCidButtons(Array.from(cids));
        if (cids.size > 0) {
            selectCid(Array.from(cids)[0]);
        }
    }

    function renderOnlyCloudData() {
        const cids = Object.keys(cidDatabase);
        finalFilteredData = [];
        
        cids.forEach(cid => {
            finalFilteredData.push({
                CID: cid,
                status: cidDatabase[cid],
                "名稱/代號": "雲端歷史紀錄",
                "詳情": "無原始明細"
            });
        });

        renderCidButtons(cids);
        if (cids.length > 0) {
            selectCid(cids[0]);
        }
    }

    function renderCidButtons(cidList) {
        const container = document.getElementById('btnContainer');
        container.innerHTML = '';
        
        cidList.sort().forEach(cid => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.id = `btn-${cid}`;
            btn.innerText = cid;
            btn.onclick = () => selectCid(cid);
            container.appendChild(btn);
        });
    }

    function filterCIDs() {
        const query = document.getElementById('search').value.toLowerCase();
        const buttons = document.querySelectorAll('#btnContainer .btn');
        buttons.forEach(btn => {
            if (btn.innerText.toLowerCase().includes(query)) {
                btn.style.display = 'inline-block';
            } else {
                btn.style.display = 'none';
            }
        });
    }

    function selectCid(cid) {
        currentSelectedCid = cid;
        document.querySelectorAll('#btnContainer .btn').forEach(b => b.classList.remove('active'));
        
        const activeBtn = document.getElementById(`btn-${cid}`);
        if (activeBtn) activeBtn.classList.add('active');

        const records = finalFilteredData.filter(item => item.CID === cid);
        if (records.length === 0) return;

        const sample = records[0];
        const keys = Object.keys(sample).filter(k => k !== 'status');

        let html = `
            <table>
                <thead>
                    <tr>
        `;
        keys.forEach(k => { html += `<th>${k}</th>`; });
        html += `<th>狀態管理</th></tr></thead><tbody>`;

        records.forEach(row => {
            html += `<tr>`;
            keys.forEach(k => {
                html += `<td>${row[k] !== undefined ? row[k] : ''}</td>`;
            });
            html += `
                <td>
                    <button class="status-btn ${row.status === '開啟' ? 'status-on' : 'status-off'}" onclick="toggleCidStatus('${cid}', '${row.status}')">
                        ${row.status}
                    </button>
                </td>
            </tr>`;
        });

        html += `</tbody></table>`;
        document.getElementById('tableContainer').innerHTML = html;
    }

    // 切換狀態並上傳雲端
    function toggleCidStatus(cid, currentStatus) {
        const newStatus = currentStatus === "開啟" ? "關閉" : "開啟";
        showSyncStatus(`💾 正在同步 [${cid}] 狀態至雲端...`);

        // 前端即時反應
        finalFilteredData.forEach(item => {
            if (item.CID === cid) item.status = newStatus;
        });
        cidDatabase[cid] = newStatus;
        selectCid(cid);

        // 發送至 Google Sheets
        fetch(CLOUD_API_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cid: cid, status: newStatus })
        })
        .then(() => {
            showSyncStatus("✅ 雲端同步完成");
        })
        .catch(err => {
            console.error(err);
            showSyncStatus("❌ 雲端同步失敗，請重新整理");
        });
    }
</script>

</body>
</html>
